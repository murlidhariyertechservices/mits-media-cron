name: Daily CRON
on:
  schedule:
    - cron: '30 1 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger daily digest
        run: |
          curl -s -X POST ${{ secrets.BACKEND_URL }}/api/jobs/run \
            -H "Content-Type: application/json" \
            -H "x-cron-secret: ${{ secrets.CRON_SECRET }}" \
            -d '{"job":"digest"}'
